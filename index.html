<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom Systems ◤A-S◢ | Engineering Sovereignty</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Urbanist:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* ESTILOS DE ÉLITE - ENTORNO GLASSMORPHISM TÁCTICO ◤A-S◢ */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #030303;
            background-image: radial-gradient(circle at 80% 20%, rgba(0, 122, 255, 0.05) 0%, transparent 50%),
                              radial-gradient(circle at 20% 80%, rgba(74, 222, 128, 0.03) 0%, transparent 50%);
            background-attachment: fixed;
            color: #F5F5F7;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
        }

        /* BARRA DE NAVEGACIÓN SUPERIOR - GLASSMORPHISM */
        header {
            width: 100%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background-color: rgba(5, 5, 5, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .nav-wrapper {
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Urbanist', sans-serif;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #FFFFFF;
        }

        .logo span {
            color: #007AFF;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            color: #86868B;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: #FFFFFF;
        }

        .btn-header {
            background-color: rgba(0, 122, 255, 0.15);
            color: #FFFFFF;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            border: 1px solid rgba(0, 122, 255, 0.3);
            transition: all 0.2s ease;
        }

        .btn-header:hover {
            background-color: #007AFF;
            box-shadow: 0 0 15px rgba(0, 122, 255, 0.4);
        }

        /* ESPACIADOR PARA CONTENIDO FIXED */
        .main-content {
            margin-top: 80px;
        }

        /* SECCIÓN HERO */
        .hero {
            padding: 140px 0 80px 0;
            position: relative;
        }

        .hero-content-wrapper {
            max-width: 750px;
            text-align: left;
        }

        .hero-tag {
            color: #007AFF;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .hero h2 {
            font-family: 'Urbanist', sans-serif;
            font-size: 64px;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -2px;
            color: #FFFFFF;
            margin-bottom: 24px;
        }

        .hero h2 span {
            color: #007AFF;
        }

        .hero p {
            font-size: 20px;
            color: #86868B;
            line-height: 1.5;
            margin-bottom: 40px;
        }

        .hero-buttons {
            display: flex;
            gap: 16px;
        }

        .btn-primary {
            background-color: #007AFF;
            color: #FFFFFF;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.2);
        }

        .btn-primary:hover {
            background-color: #0056b3;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0, 122, 255, 0.4);
        }

        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.03);
            color: #FFFFFF;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            transition: all 0.2s ease;
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* INTERFAZ PANEL DE ADQUISICIÓN LATERAL - GLASSMORPHISM AVANZADO */
        .value-proposition-sidebar {
            position: absolute;
            top: 40px;
            right: 0;
            width: 340px;
            background-color: rgba(15, 15, 17, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 28px;
            text-align: left;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 10;
            text-decoration: none;
            display: block;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .value-proposition-sidebar:hover {
            border-color: rgba(0, 122, 255, 0.4) !important;
            background-color: rgba(0, 122, 255, 0.03) !important;
            transform: translateY(-4px);
            box-shadow: 0 30px 60px rgba(0, 122, 255, 0.15), 
                        inset 0 0 20px rgba(0, 122, 255, 0.1);
        }
